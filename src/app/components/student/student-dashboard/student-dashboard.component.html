    <!-- SEARCH AND ADD -->
    <!-- TABLE -->
    <div class="row">
      <div class="mat-elevation-z8 mt-4 pl-0" style="overflow-x: auto">
        <table mat-table [dataSource]="examData" style="width: 100%">
          <!-- View Column -->
          <ng-container matColumnDef="view">
            <th mat-header-cell *matHeaderCellDef>View</th>
            <td mat-cell *matCellDef="let row">
              <button (click)="navigateToEvalAns()" class="btn btn-primary">
                <i class="fas fa-eye"></i>
              </button>
            </td>
          </ng-container>
          <!-- Exam Name Column -->
          <ng-container matColumnDef="examName">
            <th mat-header-cell *matHeaderCellDef>Exam Name</th>
            <td mat-cell *matCellDef="let row">{{ row.examName }}</td>
          </ng-container>

          <!-- Exam Date Column -->
          <ng-container matColumnDef="examDate">
            <th mat-header-cell *matHeaderCellDef>Exam Date</th>
            <td mat-cell *matCellDef="let row">{{ row.examDate }}</td>
          </ng-container>

          <!-- Subject Column -->
          <ng-container matColumnDef="subject">
            <th mat-header-cell *matHeaderCellDef>Subject</th>
            <td mat-cell *matCellDef="let row">{{ row.subject }}</td>
          </ng-container>

          <!-- Total Marks Column -->
          <ng-container matColumnDef="totalMarks">
            <th mat-header-cell *matHeaderCellDef>Total Marks</th>
            <td mat-cell *matCellDef="let row">{{ row.totalMarks }}</td>
          </ng-container>

          <!-- Marks Column -->
          <ng-container matColumnDef="marks">
            <th mat-header-cell *matHeaderCellDef>Marks</th>
            <td mat-cell *matCellDef="let row">{{ row.marks }}</td>
          </ng-container>

          <!-- Class-Division Column -->
          <ng-container matColumnDef="classDivision">
            <th mat-header-cell *matHeaderCellDef>Class-Division</th>
            <td mat-cell *matCellDef="let row">{{ row.classDivision }}</td>
          </ng-container>

          <!-- Due Date Column -->
          <ng-container matColumnDef="dueDate">
            <th mat-header-cell *matHeaderCellDef>Due Date</th>
            <td mat-cell *matCellDef="let row">{{ row.dueDate }}</td>
          </ng-container>

          <!-- Define the columns you need here... -->

          <tr
            mat-header-row
            *matHeaderRowDef="[
              'examName',
              'examDate',
              'subject',
              'totalMarks',
              'marks',
              'classDivision',
              'dueDate',
              'view'
            ]"
          ></tr>
          <tr
            mat-row
            *matRowDef="
              let row;
              columns: [
                'examName',
                'examDate',
                'subject',
                'totalMarks',
                'marks',
                'classDivision',
                'dueDate',
                'view'
              ]
            "
          ></tr>
        </table>
      </div>
    </div>

  </div>
