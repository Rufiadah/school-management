    <div class="row">
      <!-- TABLE -->
      <div class="mat-elevation-z8 mt-4 pl-0" style="overflow-x: auto">
        <table
          mat-table
          [dataSource]="dataSource"
          style="width: 100%"
          matSort
          (matSortChange)="announceSortChange($event)"
        >
          <!-- Progress Column -->
          <ng-container matColumnDef="sheet_name">
            <th
              style="width: 15rem; min-width: 10rem"
              mat-header-cell
              *matHeaderCellDef
              mat-sort-header
              sortActionDescription="Sort by name"
            >
              Folder Name
            </th>
            <td mat-cell *matCellDef="let row">
              <i class="fas fa-folder" style="color: #fff700"></i>
              {{ row.sheet_name }}
            </td>
          </ng-container>
          <!-- ID Column -->
          <ng-container matColumnDef="exam_name">
            <th
              style="width: 10rem; min-width: 10rem"
              mat-header-cell
              *matHeaderCellDef
              mat-sort-header
              sortActionDescription="Sort by name"
            >
              Exam Name
            </th>
            <td mat-cell *matCellDef="let row">{{ row.exam_name }}</td>
          </ng-container>

          <!-- Name Column -->
          <ng-container matColumnDef="subject">
            <th
              style="width: 10rem; min-width: 10rem"
              mat-header-cell
              *matHeaderCellDef
              mat-sort-header
              sortActionDescription="Sort by name"
            >
              Subject
            </th>
            <td mat-cell *matCellDef="let row">{{ row.subject }}</td>
          </ng-container>

          <!-- Fruit Column -->
          <ng-container matColumnDef="class">
            <th
              style="width: 10rem; min-width: 10rem"
              mat-header-cell
              *matHeaderCellDef
              mat-sort-header
              sortActionDescription="Sort by name"
            >
              Class
            </th>
            <td mat-cell *matCellDef="let row">{{ row.class_name }}</td>
          </ng-container>

          <ng-container matColumnDef="year_name">
            <th
              style="width: 10rem; min-width: 10rem"
              mat-header-cell
              *matHeaderCellDef
              mat-sort-header
              sortActionDescription="Sort by number"
            >
              Academic Year
            </th>
            <td mat-cell *matCellDef="let row">
              {{ row.year_name }}
            </td>
          </ng-container>

          <ng-container matColumnDef="division">
            <th
              style="width: 10rem; min-width: 10rem"
              mat-header-cell
              *matHeaderCellDef
              mat-sort-header
              sortActionDescription="Sort by name"
            >
              Division
            </th>
            <td mat-cell *matCellDef="let row">
              {{ row.division_name }}
            </td>
          </ng-container>

          <!-- <ng-container matColumnDef="exam_date">
          <th
            style="width: 10rem; min-width: 10rem"
            mat-header-cell
            *matHeaderCellDef
          >
            Exam Date
          </th>
          <td mat-cell *matCellDef="let row">
            {{ row.exam_date }}
          </td>
        </ng-container> -->

          <ng-container matColumnDef="students">
            <th
              style="width: 10rem; min-width: 10rem"
              mat-header-cell
              *matHeaderCellDef
              mat-sort-header
              sortActionDescription="Sort by number"
            >
              Total Students
            </th>
            <td mat-cell *matCellDef="let row">55</td>
          </ng-container>

          <ng-container matColumnDef="Action">
            <th
              style="width: 10rem; min-width: 10rem"
              mat-header-cell
              *matHeaderCellDef
            >
              Action
            </th>
            <td
              mat-cell
              *matCellDef="let row"
              style="
                padding-right: 24px !important;
                padding-left: 15px !important;
              "
            >
              <!-- <i class="fas fa-trash"></i> -->
              <!-- Button trigger modal -->
              <button
                (click)="openSendModal(row)"
                type="button"
                style="min-width: 9rem"
                class="btn page-btn text-white border-0"
              >
                Send To Admin
              </button>
              <!-- Modal -->
              <div
                class="modal fade"
                id="exampleModalLong"
                tabindex="-1"
                role="dialog"
                aria-labelledby="exampleModalLongTitle"
                aria-hidden="true"
              >
                <div class="modal-dialog" role="document">
                  <div class="modal-content">
                    <div class="modal-header">
                      <h3 class="modal-title" id="exampleModalLongTitle">
                        Assign to Examiner
                      </h3>
                      <button
                        type="button"
                        class="close"
                        data-dismiss="modal"
                        aria-label="Close"
                        (click)="closeModal()"
                      >
                        <span aria-hidden="true">&times;</span>
                      </button>
                    </div>
                    <div
                      class="d-flex modal-body flex-column justify-content-center m-auto align-items-center"
                      style="gap: 1rem"
                    >
                      <div *ngFor="let list of examinerDataList; currentRow">
                        <button
                          (click)="sendFolder(list, currentRow)"
                          class="btn page-btn text-white border-0"
                          style="width: 150px"
                        >
                          {{ list.name }}
                        </button>
                      </div>
                    </div>
                    <div class="modal-footer">
                      <button
                        type="button"
                        class="btn btn-secondary"
                        data-dismiss="modal"
                        (click)="closeModal()"
                      >
                        Close
                      </button>
                      <button
                        (click)="closeModal()"
                        type="button"
                        class="btn btn-primary"
                      >
                        Save changes
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        </table>
      </div>
      <mat-paginator
        (page)="handlePageEvent($event)"
        [length]="length"
        [pageSize]="pageSize"
        [pageIndex]="pageIndex"
        aria-label="Select page of users"
      ></mat-paginator>
    </div>
    <!-- TABLE -->
  </div>

  <!-- Ends: table  -->

  <!-- Dashboard ends -->
</div>
