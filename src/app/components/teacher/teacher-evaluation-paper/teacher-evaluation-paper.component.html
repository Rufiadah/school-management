                      <div
                        *ngFor="let que of questionNumber; let i = index"

                        <div class="item">

                              border-radius: 4px;
                              margin-right: 6px;
                              margin-left: 6px;

                        </div>
                      </div>

                    <button

                      style="
                        border: 1px solid rgb(241, 123, 76);
                        border-radius: 4px;

                      class="float-end"

                    </button>
                  </div>
                </div>

                  aria-labelledby="pills-profile-tab"

                        border-radius: 4px;

                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
