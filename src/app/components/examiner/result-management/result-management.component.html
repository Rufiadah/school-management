<!-- BEGIN: Content-->

      <!-- BODY CONTENT -->
      <div
      class="container-fluid bg-white" style="margin-left: 1rem"
      >
        <!-- SEARCH AND ADD -->
        <div class="row p-1">
          <div class="col-4 mt-4">
            <span class="search">
              <input
                type="text"
                class="form-control"
                placeholder="Search All"
                style="height: 45px"

              /><!-- (keyup)="applyFilter($event)"-->
              <div style="margin-top: 1em"></div>
            </span>
          </div>
          <div class="col-2"></div>

          <div class="col-1"></div>
        </div>
        <h2 class="ml-2">Result Management</h2>

        <!--  -->

        <!-- SEARCH AND ADD -->

        <!-- TABLE -->
        <div class="row">
          <div class="mat-elevation-z8 mt-4 pl-0" style="overflow-x: auto">
            <table mat-table [dataSource]="dataSource" style="width: 100%">
              <!-- Document Name Column -->
              <ng-container matColumnDef="Document Name">
                <th mat-header-cell *matHeaderCellDef>Document Name</th>
                <td mat-cell *matCellDef="let row">{{ row['Document Name'] }}</td>
              </ng-container>

              <!-- Subject Column -->
              <ng-container matColumnDef="Subject">
                <th mat-header-cell *matHeaderCellDef>Subject</th>
                <td mat-cell *matCellDef="let row">{{ row['Subject'] }}</td>
              </ng-container>

              <!-- Class Column -->
              <ng-container matColumnDef="Class">
                <th mat-header-cell *matHeaderCellDef>Class</th>
                <td mat-cell *matCellDef="let row">{{ row['Class'] }}</td>
              </ng-container>

              <!-- Division Column -->
              <ng-container matColumnDef="Division">
                <th mat-header-cell *matHeaderCellDef>Division</th>
                <td mat-cell *matCellDef="let row">{{ row['Division'] }}</td>
              </ng-container>

              <!-- Date Column -->
              <ng-container matColumnDef="Date">
                <th mat-header-cell *matHeaderCellDef>Date</th>
                <td mat-cell *matCellDef="let row">{{ row['Date'] }}</td>
              </ng-container>

              <!-- Total Students Column -->
              <ng-container matColumnDef="Total Students">
                <th mat-header-cell *matHeaderCellDef>Total Students</th>
                <td mat-cell *matCellDef="let row">{{ row['Total Students'] }}</td>
              </ng-container>

              <!-- Upload By Column -->
              <ng-container matColumnDef="Upload By">
                <th mat-header-cell *matHeaderCellDef>Upload By</th>
                <td mat-cell *matCellDef="let row">{{ row['Upload By'] }}</td>
              </ng-container>

              <!-- Action Column -->
              <!-- <ng-container matColumnDef="Action">
                <th mat-header-cell *matHeaderCellDef>Action</th>
                <td mat-cell *matCellDef="let row">
                  <button class="btn btn-primary" (click)="publish()">Publish</button>
                </td>
              </ng-container> -->

              <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
              <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
            </table>
          </div>
          <mat-paginator
          (page)="handlePageEvent($event)"
          [length]="length"
          [pageSize]="pageSize"
          [pageIndex]="pageIndex"
          aria-label="Select page of users"
        ></mat-paginator>
        </div>



        <!-- TABLE -->
      </div>
      <!-- BODY CONTENT -->
