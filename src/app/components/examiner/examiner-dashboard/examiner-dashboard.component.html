    <div class="row">
      <div class="mat-elevation-z8 mt-4 pl-0" style="overflow-x: auto">
        <table mat-table [dataSource]="dataSource" style="width: 100%">
          <!-- Exam Name Column -->
          <ng-container matColumnDef="Exam Name">
            <th mat-header-cell *matHeaderCellDef>Exam Name</th>
            <td mat-cell *matCellDef="let row">{{ row["Exam Name"] }}</td>
          </ng-container>

          <!-- Class Column -->
          <ng-container matColumnDef="Class">
            <th mat-header-cell *matHeaderCellDef>Class</th>
            <td mat-cell *matCellDef="let row">{{ row["Class"] }}</td>
          </ng-container>

          <!-- Division Column -->
          <ng-container matColumnDef="Division">
            <th mat-header-cell *matHeaderCellDef>Division</th>
            <td mat-cell *matCellDef="let row">{{ row["Division"] }}</td>
          </ng-container>

          <!-- Subject Column -->
          <ng-container matColumnDef="Subject">
            <th mat-header-cell *matHeaderCellDef>Subject</th>
            <td mat-cell *matCellDef="let row">{{ row["Subject"] }}</td>
          </ng-container>

          <!-- Year Column -->
          <ng-container matColumnDef="Year">
            <th mat-header-cell *matHeaderCellDef>Year</th>
            <td mat-cell *matCellDef="let row">{{ row["Year"] }}</td>
          </ng-container>

          <!-- Semester Column -->
          <ng-container matColumnDef="Semester">
            <th mat-header-cell *matHeaderCellDef>Semester</th>
            <td mat-cell *matCellDef="let row">{{ row["Semester"] }}</td>
          </ng-container>

          <!-- Exam Date Column -->
          <ng-container matColumnDef="Exam Date">
            <th mat-header-cell *matHeaderCellDef>Exam Date</th>
            <td mat-cell *matCellDef="let row">{{ row["Exam Date"] }}</td>
          </ng-container>

          <!-- Action Column -->
